# secret-auth.yaml
# ------------------------------------------------------------------
# Secret holding authentication and TLS credentials for the
# kubemq-rayserve adapter.
#
# Values are base64-encoded placeholders — replace them with your
# actual credentials before applying.
#
# Usage:
#   # Encode your values:
#   echo -n "your-jwt-token" | base64
#   cat client.crt | base64 -w 0
#   cat client.key | base64 -w 0
#   cat ca.crt | base64 -w 0
#
#   # Apply:
#   kubectl apply -f secret-auth.yaml
#
# To use in a Deployment / RayService:
#   env:
#     - name: KUBEMQ_AUTH_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: kubemq-adapter-auth
#           key: auth-token
#   volumes:
#     - name: kubemq-tls
#       secret:
#         secretName: kubemq-adapter-auth
#         items:
#           - key: tls-client-cert
#             path: client.crt
#           - key: tls-client-key
#             path: client.key
#           - key: tls-ca-cert
#             path: ca.crt
#   volumeMounts:
#     - name: kubemq-tls
#       mountPath: /etc/kubemq/tls
#       readOnly: true
#
# NOTE: This is a REFERENCE configuration. Never commit real
#       credentials to version control. Use sealed-secrets,
#       external-secrets, or a vault operator in production.
# ------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: kubemq-adapter-auth
  namespace: default  # Change to your target namespace
  labels:
    app: kubemq-rayserve
    component: adapter-auth
type: Opaque
data:
  # ----------------------------------------------------------------
  # JWT authentication token for KubeMQ broker.
  # Replace with: echo -n "your-jwt-token" | base64
  # ----------------------------------------------------------------
  auth-token: "REPLACE_WITH_BASE64_ENCODED_AUTH_TOKEN"

  # ----------------------------------------------------------------
  # TLS client certificate (PEM-encoded, then base64).
  # Replace with: cat client.crt | base64 -w 0
  # ----------------------------------------------------------------
  tls-client-cert: "REPLACE_WITH_BASE64_ENCODED_CLIENT_CERT"

  # ----------------------------------------------------------------
  # TLS client private key (PEM-encoded, then base64).
  # Replace with: cat client.key | base64 -w 0
  # ----------------------------------------------------------------
  tls-client-key: "REPLACE_WITH_BASE64_ENCODED_CLIENT_KEY"

  # ----------------------------------------------------------------
  # TLS CA certificate (PEM-encoded, then base64).
  # Replace with: cat ca.crt | base64 -w 0
  # ----------------------------------------------------------------
  tls-ca-cert: "REPLACE_WITH_BASE64_ENCODED_CA_CERT"
